services:
  - type: web
    name: dental-white
    env: python
    buildCommand: "apt-get install -y poppler-utils libgl1 libglib2.0-0 && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        value: https://xejfkrzaofqjzvzjyovh.supabase.co
      - key: SUPABASE_KEY
        sync: false
