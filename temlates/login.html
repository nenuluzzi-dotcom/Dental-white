<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTAL WHITE — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: white; border-radius: 16px;
    padding: 50px 40px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  .logo { font-size: 32px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
  .sub  { color: #7f8c8d; font-size: 13px; margin-bottom: 35px; }
  label { display:block; text-align:left; font-size:12px; font-weight:bold;
          color:#555; margin-bottom:5px; margin-top:15px; }
  select, input {
    width:100%; padding:12px 14px; border:2px solid #e0e0e0;
    border-radius:8px; font-size:14px; outline:none;
    transition: border-color .2s;
  }
  select:focus, input:focus { border-color: #3498db; }
  .btn {
    margin-top: 25px; width:100%; padding:14px;
    background: #27ae60; color:white; border:none;
    border-radius:8px; font-size:16px; font-weight:bold;
    cursor:pointer; transition: background .2s;
  }
  .btn:hover { background: #229954; }
  .error { color:#e74c3c; font-size:13px; margin-top:12px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🦷 DENTAL WHITE</div>
  <div class="sub">Sistema de Cobranzas</div>
  <form id="form">
    <label>USUARIO</label>
    <select name="usuario" id="usuario">
      <option>ADMINISTRADORA</option>
      <option>NENNELLA</option>
      <option>MICAELA</option>
    </select>
    <label>CONTRASEÑA</label>
    <input type="password" name="clave" id="clave" placeholder="Contraseña">
    <button class="btn" type="submit">INGRESAR</button>
    <div class="error" id="err">Clave incorrecta</div>
  </form>
</div>
<script>
document.getElementById('form').onsubmit = async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const r  = await fetch('/login', {method:'POST', body: fd});
  if (r.ok) {
    const d = await r.json();
    sessionStorage.setItem('usuario', d.usuario);
    sessionStorage.setItem('provincias', JSON.stringify(d.provincias));
    window.location = '/panel';
  } else {
    document.getElementById('err').style.display = 'block';
  }
};
</script>
</body>
</html>
