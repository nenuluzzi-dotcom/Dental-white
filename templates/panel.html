<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTAL WHITE - Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#27ae60;--verde-light:rgba(39,174,96,0.12);
  --naranja:#e67e22;--rojo:#e74c3c;--azul:#2980b9;
  --bg:#f0f2f5;--panel:#ffffff;--card:#f8f9fa;
  --border:#dee2e6;--text:#1a1a2e;--muted:#6c757d;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--verde)}
.topbar-user{font-size:13px;color:var(--muted);margin-left:auto}
.topbar-user span{color:var(--text);font-weight:600}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--rojo);color:var(--rojo)}
.layout{display:grid;grid-template-columns:300px 1fr 420px;flex:1;overflow:hidden}
.panel-izq{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-izq-scroll{flex:1;overflow-y:auto;padding:16px}
.section-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.balance-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.balance-table th{text-align:left;color:var(--muted);font-weight:500;padding:4px 6px;border-bottom:1px solid var(--border)}
.balance-table td{padding:5px 6px;border-bottom:1px solid rgba(0,0,0,.08)}
.balance-table tr:last-child td{border-bottom:none}
.prov-badge{font-size:10px;font-weight:600;letter-spacing:.5px}
.caja-dia{background:var(--verde-light);border:1px solid rgba(39,174,96,.3);border-radius:10px;padding:12px 14px;margin-bottom:16px;text-align:center}
.caja-dia .lbl{font-size:11px;color:var(--verde);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.caja-dia .val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--verde)}
.progress-wrap{margin-bottom:12px}
.progress-bar-bg{background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--verde);border-radius:4px;transition:width .4s ease;width:0%}
.progress-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-align:center;min-height:16px}
.btn-panel{width:100%;border:none;border-radius:8px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;gap:8px;transition:opacity .2s,transform .1s}
.btn-panel:hover{opacity:.85;transform:translateY(-1px)}
.btn-verde{background:var(--verde);color:white}
.btn-azul{background:var(--azul);color:white}
.btn-gris{background:#34495e;color:white}
.btn-naranja{background:var(--naranja);color:white}
.btn-rojo{background:var(--rojo);color:white}
.btn-oscuro{background:#2c3e50;color:white}
.btn-rojo-oscuro{background:#922b21;color:white}
.btn-violeta{background:#7d3c98;color:white}
.leyenda{font-size:11px;color:var(--muted);text-align:center;padding:8px 0;border-top:1px solid var(--border)}
.dot-verde{display:inline-block;width:8px;height:8px;background:#4caf50;border-radius:50%}
.dot-naranja{display:inline-block;width:8px;height:8px;background:var(--naranja);border-radius:50%}
.dot-rojo{display:inline-block;width:8px;height:8px;background:var(--rojo);border-radius:50%}
.panel-cen{display:flex;flex-direction:column;overflow:hidden}
.tabs-nav{background:var(--panel);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:12px 18px;font-size:13px;font-weight:500;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--verde);border-bottom-color:var(--verde)}
.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column}
.tab-content.active{display:flex}
.search-bar{padding:12px 16px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--verde)}
.table-wrap{flex:1;overflow-y:auto}
table.cupones{width:100%;border-collapse:collapse;font-size:13px}
table.cupones th{background:#f1f3f5;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:10px 12px;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;border-bottom:2px solid var(--border)}
table.cupones th:hover{color:var(--text)}
table.cupones td{padding:9px 12px;border-bottom:1px solid rgba(0,0,0,.06)}
table.cupones tr{cursor:pointer;transition:background .15s}
table.cupones tr:hover td{background:rgba(0,0,0,.03)}
table.cupones tr.selected td{background:rgba(39,174,96,.12)}
.row-verde td{background:rgba(39,174,96,.13)!important}
.row-naranja td{background:rgba(230,126,34,.22)!important;color:#a04000;font-weight:600}
.row-visto td{background:rgba(241,196,15,.25)!important}
.row-deudor td{background:rgba(231,76,60,.13)!important;border-left:3px solid var(--rojo)}
.badge-pagado{background:var(--verde-light);color:var(--verde);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-pend{background:rgba(231,76,60,.1);color:var(--rojo);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-visto{background:rgba(241,196,15,.3);color:#b7950b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.panel-der{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.visor-pdf{background:#2c2c2c;height:240px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.visor-pdf canvas{max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in}
.visor-pdf .visor-msg{color:#aaa;font-size:13px}
.visor-pdf .visor-loading{color:#aaa;font-size:12px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.panel-der-body{padding:16px;flex:1}
.field-group{margin-bottom:12px}
.field-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field-group input,.field-group select,.field-group textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;appearance:none}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{border-color:var(--verde)}
.field-group textarea{resize:vertical;min-height:60px}
.switch-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.switch{position:relative;width:44px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:background .2s}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:transform .2s}
input:checked+.slider{background:var(--verde)}
input:checked+.slider::before{transform:translateX(20px)}
.switch-lbl{font-size:13px;font-weight:600}
.switch-lbl.pagado{color:var(--verde)}
.switch-lbl.pendiente{color:var(--rojo)}
.btn-accion{width:100%;border:none;border-radius:8px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;transition:opacity .2s,background .2s}
.btn-accion:hover{opacity:.85}
.btn-accion:disabled{opacity:.6;cursor:not-allowed}
.btn-registrar{background:var(--verde);color:white;padding:13px;font-size:14px}
.btn-visto{background:var(--naranja);color:white}
.btn-guardar{background:#34495e;color:white}
.btn-whatsapp{background:#25d366;color:white}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:700px;width:95%;max-height:88vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal-table{width:100%;border-collapse:collapse;font-size:13px}
.modal-table th{color:var(--muted);font-size:11px;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left}
.modal-table td{padding:8px 10px;border-bottom:1px solid rgba(0,0,0,.06)}
.modal-footer{margin-top:20px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.btn-modal{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.btn-modal-cancel{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-modal-ok{background:var(--verde);color:white}
.btn-modal-rojo{background:var(--rojo);color:white}
.alerta-banner{background:#922b21;color:white;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px}
/* PENDIENTES MES */
.prov-header{background:#2c3e50;color:white;padding:8px 12px;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;border-radius:6px;margin:12px 0 4px}
.prov-header:first-child{margin-top:0}
.resumen-mes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.resumen-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.resumen-card .rc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.resumen-card .rc-val{font-size:18px;font-weight:700;color:var(--rojo)}
/* Mensajes WA */
.wa-section{background:#e8f8f0;border:1px solid #a9dfbf;border-radius:10px;padding:14px;margin-top:16px}
.wa-section h3{font-size:13px;font-weight:700;color:#1e8449;margin-bottom:10px}
.wa-tabs{display:flex;gap:8px;margin-bottom:12px}
.wa-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.wa-tab.active{background:#25d366;color:white;border-color:#25d366}
.wa-msg-box{background:white;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.6;max-height:120px;overflow-y:auto}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ced4da;border-radius:3px}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.comentario-cell{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">🦷 DENTAL WHITE</div>
  <div class="topbar-user">Sesión: <span id="lbl-usuario">-</span></div>
  <button class="btn-logout" onclick="logout()">Salir</button>
</div>
<div class="layout">

<!-- PANEL IZQ -->
<div class="panel-izq">
  <div class="panel-izq-scroll">
    <div class="section-title">📊 Balances</div>
    <table class="balance-table" id="tabla-balance">
      <thead><tr><th>Prov</th><th>Clientes</th><th>Inicial</th><th>Cobrado</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="caja-dia">
      <div class="lbl">CAJA DEL DIA</div>
      <div class="val" id="lbl-caja">$0</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-lbl" id="progress-lbl"></div>
    </div>
    <button class="btn-panel btn-verde" onclick="clickSubirPDF()">📥 SUBIR PDF</button>
    <input type="file" id="input-pdf" accept=".pdf" style="display:none" onchange="subirPDF(event)">
    <button class="btn-panel btn-azul" onclick="agregarManual()">➕ AGREGAR MANUAL</button>
    <button class="btn-panel btn-oscuro" onclick="mostrarIniciarMes()">📅 INICIAR MES</button>
    <button class="btn-panel btn-gris" onclick="mostrarCierre()">📝 CIERRE</button>
    <button class="btn-panel btn-rojo" onclick="eliminarCupon()">❌ ELIMINAR</button>
    <button class="btn-panel btn-naranja" onclick="mostrarBalanceDiario()">📊 BALANCE DIARIO</button>
    <button class="btn-panel btn-violeta" onclick="mostrarPendientesMes()">📋 PENDIENTES DEL MES</button>
    <button class="btn-panel btn-rojo" onclick="mostrarDeudores()">⚠️ 2+ CUOTAS PENDIENTES</button>
    <button class="btn-panel btn-rojo-oscuro" onclick="mostrarDeudores3()">🚨 3+ CUOTAS PENDIENTES</button>
  </div>
  <div class="leyenda">
    <span class="dot-verde"></span> Guardado &nbsp;
    <span class="dot-naranja"></span> Cuota vieja &nbsp;
    🟡 Visto &nbsp;
    <span class="dot-rojo"></span> 2+ pendientes
  </div>
</div>

<!-- PANEL CENTRAL -->
<div class="panel-cen">
  <div class="tabs-nav" id="tabs-nav"></div>
  <div id="tabs-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
</div>

<!-- PANEL DER -->
<div class="panel-der">
  <div class="visor-pdf" id="visor-pdf">
    <span class="visor-msg">Sin imagen</span>
  </div>
  <div class="panel-der-body">
    <div class="field-group"><label>N AFILIADO</label><input id="e-cta" type="text"></div>
    <div class="field-group"><label>AFILIADO</label><input id="e-nom" type="text"></div>
    <div class="field-group"><label>MONTO $</label><input id="e-mon" type="number"></div>
    <div class="field-group"><label>CTA (CUOTA)</label><input id="e-cuo" type="text"></div>
    <div class="field-group"><label>FECHA COBRO</label><input id="e-fec" type="text"></div>
    <div class="field-group"><label>WHATSAPP</label><input id="e-tel" type="text"></div>
    <div class="field-group">
      <label>METODO DE PAGO</label>
      <select id="e-pag">
        <option>EFECTIVO</option><option>TRANSFERENCIA</option>
        <option>MERCADO PAGO</option><option>TARJETA</option>
      </select>
    </div>
    <div class="switch-row">
      <label class="switch"><input type="checkbox" id="sw-estado" onchange="toggleEstado()"><span class="slider"></span></label>
      <span class="switch-lbl pendiente" id="lbl-estado">PENDIENTE</span>
    </div>
    <div class="field-group"><label>COMENTARIO / DETALLE PAGO</label><input id="e-com" type="text"></div>
    <div class="field-group">
      <label>MENSAJE WHATSAPP</label>
      <textarea id="e-msg">Hola! Le informamos que su cupon de pago Dental White esta disponible. Ante cualquier consulta no dude en contactarnos.</textarea>
    </div>
    <button class="btn-accion btn-registrar" id="btn-registrar" onclick="registrarPago()">✅ REGISTRAR PAGO</button>
    <button class="btn-accion btn-visto" id="btn-visto" onclick="marcarVisto()">👁️ VISTO</button>
    <button class="btn-accion btn-guardar" id="btn-guardar" onclick="guardarCambios()">💾 GUARDAR CAMBIOS</button>
    <button class="btn-accion btn-whatsapp" onclick="enviarWA()">🟢 ENVIAR WHATSAPP</button>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
let usuario='', provincias=[], tabActual='', cupones={}, currId=null;

// Nombres de meses en español
const MESES_ES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

window.onload = () => {
  usuario = sessionStorage.getItem('usuario');
  provincias = JSON.parse(sessionStorage.getItem('provincias') || '[]');
  if (!usuario) { window.location.href='/'; return; }
  document.getElementById('lbl-usuario').textContent = usuario;
  crearTabs();
  cargarBalance();
};

function logout() { sessionStorage.clear(); window.location.href='/'; }

// ── TABS ──────────────────────────────────────────────
function crearTabs() {
  const nav = document.getElementById('tabs-nav');
  const body = document.getElementById('tabs-body');
  const allTabs = ['PAGOS HOY', 'PAGOS DEL MES', ...provincias];
  allTabs.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = p==='PAGOS HOY' ? '✅ PAGOS HOY' : p==='PAGOS DEL MES' ? '📁 PAGOS DEL MES' : p;
    btn.dataset.tab = p;
    btn.onclick = () => activarTab(p);
    nav.appendChild(btn);
    const div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = 'tab-'+p;

    const headersPagosEspecial = `
      <th>ID</th><th>AFILIADO (N° incluido)</th><th>MONTO</th>
      <th>CTA</th><th>PROVINCIA</th><th>COMENTARIO</th><th>METODO</th><th>ESTADO</th>`;
    const headersNormal = `
      <th onclick="ordenarPor('${p}','id')">ID</th>
      <th onclick="ordenarPor('${p}','cuenta')">N°</th>
      <th onclick="ordenarPor('${p}','nombre')">AFILIADO</th>
      <th onclick="ordenarPor('${p}','monto')">MONTO</th>
      <th onclick="ordenarPor('${p}','cta')">CTA</th>
      <th title="Cuotas pendientes">📋</th>
      <th onclick="ordenarPor('${p}','fecha_cobro')">FECHA</th>
      <th>ESTADO</th>`;

    const esEspecial = (p==='PAGOS HOY' || p==='PAGOS DEL MES');
    div.innerHTML = `
      <div class="search-bar">
        <input class="search-input" placeholder="Buscar afiliado..." oninput="buscarEn('${p}',this.value)">
      </div>
      <div class="table-wrap">
        <table class="cupones">
          <thead><tr>${esEspecial ? headersPagosEspecial : headersNormal}</tr></thead>
          <tbody id="tbody-${p}"></tbody>
        </table>
      </div>`;
    body.appendChild(div);
  });
  tabActual = 'PAGOS HOY';
  cargarTab(tabActual);
}

function activarTab(p) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===p));
  document.querySelectorAll('.tab-content').forEach(d=>d.classList.toggle('active', d.id==='tab-'+p));
  tabActual = p;
  cargarTab(p);
}

async function cargarTab(p, buscar='') {
  let url;
  if (p==='PAGOS HOY') {
    url = `/api/cupones/hoy?provincias=${encodeURIComponent(provincias.join(','))}`;
  } else if (p==='PAGOS DEL MES') {
    url = `/api/cupones/mes?provincias=${encodeURIComponent(provincias.join(','))}`;
  } else {
    url = `/api/cupones?provincia=${encodeURIComponent(p)}&buscar=${encodeURIComponent(buscar)}`;
  }
  const res = await fetch(url);
  const data = await res.json();
  cupones[p] = data;
  renderTabla(p, data);
  cargarBalance();
}

function renderTabla(p, data) {
  const tbody = document.getElementById('tbody-'+p);
  if (!tbody) return;
  tbody.innerHTML = '';
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Sin registros</td></tr>';
    return;
  }

  if (p === 'PAGOS HOY' || p === 'PAGOS DEL MES') {
    data.forEach(r => {
      const tr = document.createElement('tr');
      if (r.visto) tr.classList.add('row-visto');
      if (r.id===currId) tr.classList.add('selected');
      tr.onclick = () => cargarDetalle(r.id);
      const badge = r.estado==='PAGADO'
        ? `<span class="badge-pagado">PAGADO${r.visto?' 👁️':''}</span>`
        : `<span class="badge-pend">PEND</span>`;
      const nro = r.cuenta && r.cuenta!=='S/D' ? `<span style="font-size:10px;color:#888;margin-right:4px">N°${r.cuenta}</span>` : '';
      tr.innerHTML = `
        <td>${r.id}</td>
        <td>${nro}<strong>${r.nombre||''}</strong></td>
        <td>$${(r.monto||0).toLocaleString('es-AR')}</td>
        <td>${r.cta||''}</td>
        <td style="font-size:11px">${(r.provincia||'').substring(0,8)}</td>
        <td class="comentario-cell" title="${r.comentario||''}">${r.comentario||''}</td>
        <td style="font-size:11px">${r.medio_pago||''}</td>
        <td>${badge}</td>`;
      tbody.appendChild(tr);
    });
  } else {
    data.forEach(r => {
      const tr = document.createElement('tr');
      if (r.cuotas_pendientes > 1) {
        tr.className = 'row-deudor';
      } else {
        tr.className = r.color==='verde' ? 'row-verde' : r.color==='naranja' ? 'row-naranja' : '';
      }
      if (r.id===currId) tr.classList.add('selected');
      tr.onclick = () => cargarDetalle(r.id);
      const badge = r.estado==='PAGADO'
        ? '<span class="badge-pagado">PAGADO</span>'
        : '<span class="badge-pend">PENDIENTE</span>';
      const cuotasCell = r.cuotas_pendientes > 1
        ? `<td style="text-align:center"><span style="background:#e74c3c;color:white;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700">${r.cuotas_pendientes}</span></td>`
        : `<td style="text-align:center;color:#aaa;font-size:11px">${r.cuotas_pendientes||''}</td>`;
      tr.innerHTML = `<td>${r.id}</td><td>${r.cuenta||''}</td><td>${r.nombre||''}</td>
        <td>$${(r.monto||0).toLocaleString('es-AR')}</td>
        <td>${r.cta||''}</td>${cuotasCell}<td>${r.fecha_cobro||''}</td><td>${badge}</td>`;
      tbody.appendChild(tr);
    });
  }
}

function buscarEn(p, val) {
  if (p === 'PAGOS HOY' || p === 'PAGOS DEL MES') {
    if (!cupones[p]) return;
    const q = val.trim().toLowerCase();
    const filtrado = q
      ? cupones[p].filter(r =>
          (r.nombre || '').toLowerCase().includes(q) ||
          (r.cuenta || '').toLowerCase().includes(q))
      : cupones[p];
    renderTabla(p, filtrado);
  } else {
    cargarTab(p, val);
  }
}

function ordenarPor(p, campo) {
  if (!cupones[p]) return;
  const asc = cupones[p]._orden !== campo;
  cupones[p].sort((a,b) => {
    let va=a[campo]??'', vb=b[campo]??'';
    if (!isNaN(va)&&!isNaN(vb)){va=Number(va);vb=Number(vb);}
    return asc?(va>vb?1:-1):(va<vb?1:-1);
  });
  cupones[p]._orden = asc ? campo : null;
  renderTabla(p, cupones[p]);
}

// ── VISOR IMAGEN ──────────────────────────────────────
function renderizarVisor(imgPath, cuponId) {
  const visor = document.getElementById('visor-pdf');
  visor.innerHTML = '';
  if (!imgPath && !cuponId) { visor.innerHTML = '<span class="visor-msg">Sin imagen</span>'; return; }
  if (imgPath && imgPath.startsWith('http') && !imgPath.startsWith('REF|')) {
    visor.innerHTML = '<span class="visor-loading">Cargando...</span>';
    const img = document.createElement('img');
    img.src = imgPath;
    img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in';
    img.onclick = () => window.open(imgPath, '_blank');
    img.onload = () => { visor.innerHTML = ''; visor.appendChild(img); };
    img.onerror = () => cargarImagenOnDemand(cuponId);
    return;
  }
  if (cuponId) cargarImagenOnDemand(cuponId);
  else visor.innerHTML = '<span class="visor-msg">Sin imagen</span>';
}

function cargarImagenOnDemand(cuponId) {
  const visor = document.getElementById('visor-pdf');
  if (!cuponId) { visor.innerHTML = '<span class="visor-msg">Sin imagen</span>'; return; }
  visor.innerHTML = '<span class="visor-loading">Cargando imagen...</span>';
  const img = document.createElement('img');
  img.src = `/api/imagen/${cuponId}?t=${Date.now()}`;
  img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in';
  img.onclick = () => window.open(img.src, '_blank');
  img.onload = () => { visor.innerHTML = ''; visor.appendChild(img); };
  img.onerror = () => { visor.innerHTML = '<span class="visor-msg">Sin imagen</span>'; };
}

function bloquearBtn(id, textoEspera) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = true;
  btn._textoOriginal = btn.textContent;
  btn.textContent = textoEspera;
}
function desbloquearBtn(id, textoOk, delay=1800) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.textContent = textoOk;
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = btn._textoOriginal || btn.textContent;
  }, delay);
}

function clickSubirPDF() {

  document.getElementById('input-pdf').click();

async function subirPDF(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const fill = document.getElementById('progress-fill');
  const lbl  = document.getElementById('progress-lbl');
  fill.style.width = '3%';
  lbl.textContent = 'Enviando PDF...';
  const fd = new FormData();
  fd.append('provincia', tabActual);
  fd.append('archivo', file);
  let res;
  try {
    res = await fetch('/api/subir_pdf', {method:'POST', body:fd});
  } catch(e) {
    lbl.textContent = '❌ Error de conexion';
    fill.style.width = '0%';
    return;
  }
  if (!res.ok) {
    lbl.textContent = '❌ Error al subir';
    fill.style.width = '0%';
    return;
  }
  const {tarea_id} = await res.json();
  const interval = setInterval(async () => {
    try {
      const pr = await fetch(`/api/progreso/${tarea_id}`);
      const pd = await pr.json();
      if (pd.total > 0) {
        const pct = Math.round((pd.pagina / pd.total) * 100);
        fill.style.width = Math.max(5, pct) + '%';
        lbl.textContent = `📄 Pagina ${pd.pagina}/${pd.total} — ${pd.detectados} detectados`;
      } else {
        fill.style.width = '8%';
        lbl.textContent = 'Subiendo PDF al servidor...';
      }
      if (pd.estado === 'listo') {
        fill.style.width = '100%';
        const salt = pd.saltados ? ` (${pd.saltados} ya existian)` : '';
        lbl.textContent = `✅ ${pd.detectados} cupones importados${salt}`;
        clearInterval(interval);
        setTimeout(() => { fill.style.width='0%'; lbl.textContent=''; }, 6000);
        cargarTab(tabActual);
        cargarBalance();
      } else if (pd.estado === 'error') {
        lbl.textContent = '❌ Error: ' + (pd.error||'ver logs');
        fill.style.width = '0%';
        clearInterval(interval);
      }
    } catch(e) {}
  }, 800);
}

// ── PENDIENTES DEL MES (NUEVO) ───────────────────────
// ════════════════════════════════════════════════════════
async function mostrarPendientesMes() {
  // Mes y año actuales
  const ahora     = new Date();
  const mesActual = ahora.getMonth();       // 0-11
  const anioActual= ahora.getFullYear();
  const mesNombre = MESES_ES[mesActual];    // ej. "ABRIL"
  const mesNum    = String(mesActual + 1).padStart(2, '0'); // "04"

  // Traer todos los cupones PENDIENTES de todas las provincias
  let todos = [];
  for (const prov of provincias) {
    try {
      const res  = await fetch(`/api/cupones?provincia=${encodeURIComponent(prov)}`);
      const data = await res.json();
      // Agregar provincia a cada item (por si el objeto no la trae)
      data.forEach(r => { if (!r.provincia) r.provincia = prov; });
      todos = todos.concat(data);
    } catch(e) {}
  }

  // Filtrar: PENDIENTE + que la cuota/fecha corresponda al mes actual
  // Detectamos el mes por fecha_cobro (formato DD/MM/AAAA o AAAA-MM-DD)
  // o por el campo cta que puede contener "04", "ABR", "ABRIL", etc.
  const pendientesMes = todos.filter(r => {
    if (r.estado === 'PAGADO') return false;

    // Intentar por fecha_cobro
    if (r.fecha_cobro) {
      const fc = r.fecha_cobro.toString().trim();
      // Formato DD/MM/AAAA
      const m1 = fc.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m1) {
        const mm = parseInt(m1[2]);
        const aa = parseInt(m1[3]);
        if (mm === mesActual + 1 && aa === anioActual) return true;
      }
      // Formato AAAA-MM-DD
      const m2 = fc.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m2) {
        const mm = parseInt(m2[2]);
        const aa = parseInt(m2[1]);
        if (mm === mesActual + 1 && aa === anioActual) return true;
      }
    }

    // Intentar por campo cta/cuota que puede tener "04", "ABR", "ABRIL", "4"
    if (r.cta) {
      const cta = r.cta.toString().trim().toUpperCase();
      if (
        cta === mesNum ||                          // "04"
        cta === String(mesActual + 1) ||           // "4"
        cta === mesNombre ||                       // "ABRIL"
        cta === mesNombre.substring(0,3) ||        // "ABR"
        cta.includes(mesNombre) ||
        cta.includes(mesNombre.substring(0,3))
      ) return true;
    }

    return false;
  });

  if (!pendientesMes.length) {
    abrirModal(`
      <h2>📋 Pendientes de ${mesNombre} ${anioActual}</h2>
      <p style="color:var(--muted);padding:20px 0">No hay cupones pendientes para ${mesNombre} ${anioActual}.</p>
      <div class="modal-footer"><button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button></div>`);
    return;
  }

  // Ordenar: por provincia (alfabético) y dentro de cada provincia por número de afiliado (cuenta)
  pendientesMes.sort((a, b) => {
    const pa = (a.provincia || '').toUpperCase();
    const pb = (b.provincia || '').toUpperCase();
    if (pa !== pb) return pa < pb ? -1 : 1;
    // Número de afiliado: intentar numérico primero
    const na = parseInt(a.cuenta) || 0;
    const nb = parseInt(b.cuenta) || 0;
    if (na !== nb) return na - nb;
    return (a.cuenta||'').localeCompare(b.cuenta||'');
  });

  // Agrupar por provincia para la vista
  const porProvincia = {};
  pendientesMes.forEach(r => {
    const pv = r.provincia || 'SIN PROVINCIA';
    if (!porProvincia[pv]) porProvincia[pv] = [];
    porProvincia[pv].push(r);
  });

  // Totales
  const totalClientes = pendientesMes.length;
  const totalMonto    = pendientesMes.reduce((s,r) => s + (r.monto||0), 0);
  const totalProvs    = Object.keys(porProvincia).length;

  // Armar tabla agrupada por provincia
  let tablaHTML = '';
  Object.entries(porProvincia).forEach(([pv, lista]) => {
    const subtotal = lista.reduce((s,r) => s + (r.monto||0), 0);
    tablaHTML += `
      <tr>
        <td colspan="5" style="background:#2c3e50;color:white;font-weight:700;font-size:11px;letter-spacing:1px;padding:8px 12px;text-transform:uppercase">
          📍 ${pv} &nbsp;—&nbsp; ${lista.length} cliente/s &nbsp;|&nbsp; $${subtotal.toLocaleString('es-AR')}
        </td>
      </tr>`;
    lista.forEach(r => {
      tablaHTML += `
        <tr style="background:rgba(231,76,60,.05)">
          <td style="font-size:11px;color:#888">N°${r.cuenta||'S/D'}</td>
          <td><strong>${r.nombre||''}</strong></td>
          <td style="font-size:11px">${r.cta||''}</td>
          <td style="font-size:11px">${r.fecha_cobro||''}</td>
          <td><strong style="color:var(--rojo)">$${(r.monto||0).toLocaleString('es-AR')}</strong></td>
        </tr>`;
    });
  });

  // Mensajes WhatsApp
  const msgSimple = (nombre, monto, mes) =>
    `Hola ${nombre}! Le recordamos que tiene pendiente el pago de la cuota de ${mes} de Dental White por $${monto.toLocaleString('es-AR')}. Por favor regularice su situación. Ante cualquier consulta comuníquese con nosotros.`;

  const msgBaja = (nombre, monto, mes) =>
    `Hola ${nombre}! Le informamos que registra la cuota de ${mes} impaga por $${monto.toLocaleString('es-AR')}. Le pedimos regularizar su situación a la brevedad, de lo contrario se procederá a la baja del servicio. Gracias.`;

  // Ejemplo con primer cliente de la lista
  const ejNombre = pendientesMes[0].nombre || 'CLIENTE';
  const ejMonto  = pendientesMes[0].monto  || 0;

  abrirModal(`
    <h2>📋 Pendientes de ${mesNombre} ${anioActual}</h2>

    <div class="resumen-mes">
      <div class="resumen-card">
        <div class="rc-lbl">Clientes</div>
        <div class="rc-val" style="color:#7d3c98">${totalClientes}</div>
      </div>
      <div class="resumen-card">
        <div class="rc-lbl">Provincias</div>
        <div class="rc-val" style="color:#2980b9">${totalProvs}</div>
      </div>
      <div class="resumen-card">
        <div class="rc-lbl">Total a cobrar</div>
        <div class="rc-val">$${totalMonto.toLocaleString('es-AR')}</div>
      </div>
    </div>

    <table class="modal-table" style="margin-bottom:0">
      <thead>
        <tr>
          <th>N° AFIL.</th><th>NOMBRE</th><th>CUOTA</th><th>FECHA</th><th>MONTO</th>
        </tr>
      </thead>
      <tbody>${tablaHTML}</tbody>
    </table>

    <div class="wa-section" style="margin-top:16px">
      <h3>📱 Modelos de mensaje WhatsApp</h3>
      <div class="wa-tabs">
        <button class="wa-tab active" onclick="switchWATab(this,'wa-recordatorio')">Recordatorio</button>
        <button class="wa-tab" onclick="switchWATab(this,'wa-baja')">Aviso de baja</button>
      </div>
      <div id="wa-recordatorio" class="wa-msg-box">${msgSimple(ejNombre, ejMonto, mesNombre)}</div>
      <div id="wa-baja" class="wa-msg-box" style="display:none">${msgBaja(ejNombre, ejMonto, mesNombre)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">* Ejemplo con el primer cliente de la lista. Editá el texto y copialo para cada cliente.</div>
    </div>

    <div class="modal-footer">
      <button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-modal" style="background:#7d3c98;color:white" onclick="descargarPendientesMesTxt()">💾 Guardar .txt</button>
    </div>`);
}

function switchWATab(btn, targetId) {
  document.querySelectorAll('.wa-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['wa-recordatorio','wa-baja'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id === targetId ? 'block' : 'none';
  });
}

async function descargarPendientesMesTxt() {
  const ahora      = new Date();
  const mesActual  = ahora.getMonth();
  const anioActual = ahora.getFullYear();
  const mesNombre  = MESES_ES[mesActual];
  const mesNum     = String(mesActual + 1).padStart(2, '0');
  const hoy        = ahora.toLocaleDateString('es-AR');

  let todos = [];
  for (const prov of provincias) {
    try {
      const res  = await fetch(`/api/cupones?provincia=${encodeURIComponent(prov)}`);
      const data = await res.json();
      data.forEach(r => { if (!r.provincia) r.provincia = prov; });
      todos = todos.concat(data);
    } catch(e) {}
  }

  const pendientesMes = todos.filter(r => {
    if (r.estado === 'PAGADO') return false;
    if (r.fecha_cobro) {
      const fc = r.fecha_cobro.toString().trim();
      const m1 = fc.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m1 && parseInt(m1[2]) === mesActual+1 && parseInt(m1[3]) === anioActual) return true;
      const m2 = fc.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m2 && parseInt(m2[2]) === mesActual+1 && parseInt(m2[1]) === anioActual) return true;
    }
    if (r.cta) {
      const cta = r.cta.toString().trim().toUpperCase();
      if (cta === mesNum || cta === String(mesActual+1) || cta === mesNombre ||
          cta === mesNombre.substring(0,3) || cta.includes(mesNombre) ||
          cta.includes(mesNombre.substring(0,3))) return true;
    }
    return false;
  });

  pendientesMes.sort((a,b) => {
    const pa=(a.provincia||'').toUpperCase(), pb=(b.provincia||'').toUpperCase();
    if (pa!==pb) return pa<pb?-1:1;
    return (parseInt(a.cuenta)||0)-(parseInt(b.cuenta)||0);
  });

  const porProvincia = {};
  pendientesMes.forEach(r => {
    const pv = r.provincia||'SIN PROVINCIA';
    if (!porProvincia[pv]) porProvincia[pv]=[];
    porProvincia[pv].push(r);
  });

  const totalMonto = pendientesMes.reduce((s,r)=>s+(r.monto||0),0);

  let txt = `DENTAL WHITE — CUPONES PENDIENTES ${mesNombre} ${anioActual}\n`;
  txt += `Generado: ${hoy}\n`;
  txt += `${'='.repeat(60)}\n\n`;
  txt += `Total clientes: ${pendientesMes.length}   |   Total a cobrar: $${totalMonto.toLocaleString('es-AR')}\n\n`;

  Object.entries(porProvincia).forEach(([pv, lista]) => {
    const sub = lista.reduce((s,r)=>s+(r.monto||0),0);
    txt += `\n${'─'.repeat(60)}\n`;
    txt += `PROVINCIA: ${pv.toUpperCase()} — ${lista.length} cliente/s — $${sub.toLocaleString('es-AR')}\n`;
    txt += `${'─'.repeat(60)}\n`;
    lista.forEach((r,i) => {
      txt += `${String(i+1).padStart(3,'0')}. N°${(r.cuenta||'S/D').toString().padEnd(8)} ${(r.nombre||'').padEnd(30)} Cuota: ${(r.cta||'').toString().padEnd(6)} $${(r.monto||0).toLocaleString('es-AR')}\n`;
    });
  });

  txt += `\n${'='.repeat(60)}\n`;
  txt += `MENSAJES WHATSAPP\n${'='.repeat(60)}\n\n`;
  txt += `--- RECORDATORIO ---\n`;
  txt += `Hola [NOMBRE]! Le recordamos que tiene pendiente el pago de la cuota de ${mesNombre} de Dental White por $[MONTO]. Por favor regularice su situación. Ante cualquier consulta comuníquese con nosotros.\n\n`;
  txt += `--- AVISO DE BAJA ---\n`;
  txt += `Hola [NOMBRE]! Le informamos que registra la cuota de ${mesNombre} impaga por $[MONTO]. Le pedimos regularizar su situación a la brevedad, de lo contrario se procederá a la baja del servicio. Gracias.\n`;

  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `pendientes_${mesNombre.toLowerCase()}_${anioActual}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── DEUDORES 2+ ───────────────────────────────────────
async function mostrarDeudores() {
  const res = await fetch(`/api/deudores?provincias=${encodeURIComponent(provincias.join(','))}`);
  const data = await res.json();
  if (!data.length) {
    abrirModal(`<h2>⚠️ Clientes con 2+ Cuotas Pendientes</h2><p style="color:var(--muted);padding:20px 0">No hay clientes con 2 o más cuotas pendientes.</p><div class="modal-footer"><button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button></div>`);
    return;
  }
  let rows = data.map(c => {
    const detalle = c.cupones.map(d =>
      `<div style="font-size:11px;color:#555">Cuota ${d.cta} ${d.mes} — $${(d.monto||0).toLocaleString('es-AR')}</div>`
    ).join('');
    return `<tr>
      <td><span style="font-size:10px;color:#888">N°${c.cuenta||'S/D'}</span><br><strong>${c.nombre}</strong></td>
      <td style="font-size:11px">${c.provincia}</td>
      <td style="text-align:center"><span style="background:#e74c3c;color:white;border-radius:12px;padding:2px 10px;font-weight:700">${c.cupones.length}</span></td>
      <td>${detalle}</td>
      <td><strong>$${(c.total||0).toLocaleString('es-AR')}</strong></td>
    </tr>`;
  }).join('');
  abrirModal(`
    <h2>⚠️ Clientes con 2+ Cuotas Pendientes</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">${data.length} cliente/s — ordenados por N° de afiliado</p>
    <table class="modal-table">
      <thead><tr><th>Afiliado</th><th>Prov</th><th>Cuotas</th><th>Detalle</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="modal-footer">
      <button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-modal" style="background:#2980b9;color:white" onclick="descargarDeudoresTxt()">💾 Guardar .txt</button>
    </div>`);
}

    <table class="modal-table">

    <div class="modal-footer">

      <button class="btn-modal" style="background:#2980b9;color:white" onclick="descargarDeudores3Txt()">💾 Guardar .txt</button>
    </div>`);
}

async function descargarDeudores3Txt() {
  const res = await fetch(`/api/deudores?provincias=${encodeURIComponent(provincias.join(','))}`);
  const todos = await res.json();
  const data = todos.filter(c=>c.cupones.length>=3);
  const totalAdeudado = data.reduce((s,c)=>s+(c.total||0),0);
  const hoy = new Date().toLocaleDateString('es-AR');
  let txt = `DENTAL WHITE — CLIENTES CON 3+ CUOTAS PENDIENTES\nFecha: ${hoy}\n${'='.repeat(55)}\n\n`;
  txt += `Total clientes: ${data.length}   |   Total adeudado: $${totalAdeudado.toLocaleString('es-AR')}\n\n${'─'.repeat(55)}\n`;
  data.forEach(c => {
    txt += `N° ${c.cuenta||'S/D'} — ${c.nombre} (${c.provincia})\n  Cuotas pendientes: ${c.cupones.length}\n`;
    c.cupones.forEach(d=>{txt+=`    · Cuota ${d.cta} ${d.mes} — $${(d.monto||0).toLocaleString('es-AR')}\n`;});

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});

  const a=document.createElement('a');

  URL.revokeObjectURL(url);
}
