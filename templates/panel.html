<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTAL WHITE - Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --verde: #1a9e6e; --verde-light: rgba(26,158,110,0.12);
  --naranja: #e67e22; --naranja-light: rgba(230,126,34,0.12);
  --rojo: #e74c3c; --azul: #2471a3;
  --bg: #dff0f8; --panel: #ffffff; --card: #eaf4fb;
  --border: #aed6f1; --text: #17374a; --muted: #5d8aa0;
  --celeste-header: #d6eaf8;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* TOP BAR */
.topbar { background: var(--azul); border-bottom: 1px solid #1a5276; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 100; }
.topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: white; }
.topbar-user { font-size: 13px; color: rgba(255,255,255,0.75); margin-left: auto; }
.topbar-user span { color: white; font-weight: 600; }
.btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.btn-logout:hover { border-color: white; background: rgba(255,255,255,0.15); }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 280px 1fr 400px; flex: 1; overflow: hidden; }

/* PANEL IZQ */
.panel-izq { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-izq-scroll { flex: 1; overflow-y: auto; padding: 14px; }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

.balance-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px; }
.balance-table th { text-align: left; color: var(--muted); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.balance-table td { padding: 5px 6px; border-bottom: 1px solid var(--border); }
.balance-table tr:last-child td { border-bottom: none; }

.caja-dia { background: var(--verde-light); border: 1px solid rgba(26,158,110,0.3); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; text-align: center; }
.caja-dia .lbl { font-size: 10px; color: var(--verde); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.caja-dia .val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--verde); }

.progress-wrap { margin-bottom: 10px; }
.progress-bar-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--verde); border-radius: 4px; transition: width 0.4s; width: 0%; }
.progress-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: center; min-height: 16px; }

.btn-panel { width: 100%; border: none; border-radius: 7px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 7px; transition: opacity 0.2s, transform 0.1s; }
.btn-panel:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-verde   { background: var(--verde); color: white; }
.btn-azul    { background: var(--azul); color: white; }
.btn-gris    { background: #5d6d7e; color: white; }
.btn-naranja { background: var(--naranja); color: white; }
.btn-rojo    { background: var(--rojo); color: white; }
.btn-oscuro  { background: #2c3e50; color: white; }

.leyenda { font-size: 11px; color: var(--muted); text-align: center; padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.dot-verde { background: var(--verde); }
.dot-naranja { background: var(--naranja); }
.dot-azul { background: #1a5276; }

/* PANEL CENTRAL */
.panel-cen { display: flex; flex-direction: column; overflow: hidden; }
.tabs-nav { background: var(--celeste-header); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.tabs-nav::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 11px 16px; font-size: 12px; font-weight: 600; color: var(--muted); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--azul); border-bottom-color: var(--azul); }

.tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.tab-content.active { display: flex; }

.search-bar { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--celeste-header); }
.search-input { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--azul); }

.table-wrap { flex: 1; overflow-y: auto; }
table.cupones { width: 100%; border-collapse: collapse; font-size: 12px; }
table.cupones th { background: var(--celeste-header); color: var(--muted); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 9px 10px; position: sticky; top: 0; z-index: 10; cursor: pointer; user-select: none; border-bottom: 2px solid var(--border); }
table.cupones th:hover { color: var(--text); }
table.cupones td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
table.cupones tr { cursor: pointer; transition: background 0.12s; }
table.cupones tr:hover td { background: rgba(0,0,0,0.03); }
table.cupones tr.selected td { background: rgba(26,158,110,0.14) !important; }
.row-verde td   { background: rgba(26,158,110,0.06) !important; }
.row-naranja td { background: rgba(230,126,34,0.08) !important; }
.row-multi td   { background: rgba(26,82,118,0.07) !important; }

.badge-pagado { background: var(--verde-light); color: var(--verde); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-pend   { background: rgba(231,76,60,0.1); color: var(--rojo); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.badge-multi  { background: rgba(26,82,118,0.12); color: #1a5276; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; }

/* PANEL DER */
.panel-der { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.visor-img { background: var(--card); height: 200px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; flex-shrink: 0; overflow: hidden; position: relative; cursor: pointer; }
.visor-img img { width: 100%; height: 100%; object-fit: contain; }
.visor-img:hover .visor-overlay { opacity: 1; }
.visor-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600; gap: 8px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }

.panel-der-body { padding: 14px; flex: 1; }
.field-group { margin-bottom: 10px; }
.field-group label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.field-group input, .field-group select, .field-group textarea { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; outline: none; transition: border-color 0.2s; appearance: none; }
.field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color: var(--azul); }
.field-group textarea { resize: vertical; min-height: 55px; }

.switch-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 9px 12px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
.switch { position: relative; width: 42px; height: 23px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #b0bec5; border-radius: 23px; cursor: pointer; transition: background 0.2s; }
.slider::before { content: ''; position: absolute; width: 17px; height: 17px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
input:checked + .slider { background: var(--verde); }
input:checked + .slider::before { transform: translateX(19px); }
.switch-lbl { font-size: 13px; font-weight: 700; }
.switch-lbl.pagado   { color: var(--verde); }
.switch-lbl.pendiente { color: var(--rojo); }

.btn-accion { width: 100%; border: none; border-radius: 8px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 6px; transition: opacity 0.2s, transform 0.1s; }
.btn-accion:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-registrar { background: var(--verde); color: white; padding: 12px; font-size: 14px; }
.btn-visto     { background: var(--naranja); color: white; }
.btn-guardar   { background: #5d6d7e; color: white; }
.btn-whatsapp  { background: #25d366; color: white; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 24px; max-width: 560px; width: 92%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; margin-top: -4px; }
.modal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.modal-table th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
.modal-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.modal-footer { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
.btn-modal { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-modal-cancel { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-modal-ok   { background: var(--verde); color: white; }
.btn-modal-azul { background: var(--azul); color: white; }
.btn-modal-rojo { background: var(--rojo); color: white; }

/* IMAGEN FULLSCREEN */
.img-fullscreen { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
.img-fullscreen.open { display: flex; }
.img-fullscreen img { max-width: 90vw; max-height: 75vh; border-radius: 8px; box-shadow: 0 4px 40px rgba(0,0,0,0.5); }
.img-fs-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 30px; cursor: pointer; background: none; border: none; line-height: 1; }
.img-fs-btns { display: flex; gap: 12px; }
.btn-fs { padding: 11px 22px; border-radius: 9px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-fs-wa { background: #25d366; color: white; }
.btn-fs-dl { background: white; color: #333; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.empty-state { text-align: center; padding: 36px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">🦷 DENTAL WHITE</div>
  <div class="topbar-user">Sesión: <span id="lbl-usuario">-</span></div>
  <button class="btn-logout" onclick="logout()">Salir</button>
</div>

<div class="layout">

<!-- PANEL IZQ -->
<div class="panel-izq">
  <div class="panel-izq-scroll">
    <div class="section-title">📊 Balance</div>
    <table class="balance-table" id="tabla-balance">
      <thead><tr><th>Prov</th><th>Clientes</th><th>Inicial</th><th>Cobrado</th></tr></thead>
      <tbody></tbody>
    </table>

    <div class="caja-dia">
      <div class="lbl">CAJA DEL DÍA</div>
      <div class="val" id="lbl-caja">$0</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-lbl" id="progress-lbl"></div>
    </div>

    <button class="btn-panel btn-verde" onclick="clickSubirPDF()">📥 SUBIR PDF</button>
    <input type="file" id="input-pdf" accept=".pdf" style="display:none" onchange="subirPDF(event)">
    <button class="btn-panel btn-azul" onclick="agregarManual()">➕ AGREGAR MANUAL</button>
    <button class="btn-panel btn-oscuro" onclick="mostrarIniciarMes()">📅 INICIAR MES</button>
    <button class="btn-panel btn-gris" onclick="mostrarCierre()">📝 CIERRE</button>
    <button class="btn-panel btn-naranja" onclick="mostrarBalanceDiario()">📊 BALANCE DIARIO</button>
    <button class="btn-panel btn-rojo" onclick="eliminarCupon()">❌ ELIMINAR CUPÓN</button>
  </div>
  <div class="leyenda">
    <span class="dot dot-verde"></span> Listo &nbsp;
    <span class="dot dot-naranja"></span> 2 cuotas &nbsp;
    <span class="dot dot-azul"></span> 3+ cuotas
  </div>
</div>

<!-- PANEL CENTRAL -->
<div class="panel-cen">
  <div class="tabs-nav" id="tabs-nav"></div>
  <div id="tabs-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
</div>

<!-- PANEL DER -->
<div class="panel-der">
  <div class="visor-img" id="visor-img" onclick="abrirFullscreen()">
    <span id="visor-ph">Sin imagen</span>
    <div class="visor-overlay">🔍 Ver / Compartir</div>
  </div>
  <div class="panel-der-body">
    <div class="field-group"><label>N° AFILIADO</label><input id="e-cta" type="text"></div>
    <div class="field-group"><label>AFILIADO</label><input id="e-nom" type="text"></div>
    <div class="field-group"><label>MONTO $</label><input id="e-mon" type="number"></div>
    <div class="field-group"><label>CTA (CUOTA)</label><input id="e-cuo" type="text"></div>
    <div class="field-group"><label>FECHA COBRO</label><input id="e-fec" type="text"></div>
    <div class="field-group"><label>WHATSAPP</label><input id="e-tel" type="text"></div>
    <div class="field-group">
      <label>MÉTODO DE PAGO</label>
      <select id="e-pag">
        <option>EFECTIVO</option><option>TRANSFERENCIA</option>
        <option>MERCADO PAGO</option><option>TARJETA</option>
      </select>
    </div>
    <div class="switch-row">
      <label class="switch">
        <input type="checkbox" id="sw-estado" onchange="toggleEstado()">
        <span class="slider"></span>
      </label>
      <span class="switch-lbl pendiente" id="lbl-estado">PENDIENTE</span>
    </div>
    <div class="field-group"><label>COMENTARIO</label><input id="e-com" type="text"></div>
    <div class="field-group">
      <label>MENSAJE WHATSAPP</label>
      <textarea id="e-msg">Hola! Le informamos que su cupón de pago Dental White está disponible. Ante cualquier consulta no dude en contactarnos.</textarea>
    </div>
    <button class="btn-accion btn-registrar" onclick="registrarPago()">✅ REGISTRAR PAGO</button>
    <button class="btn-accion btn-visto" onclick="marcarVisto()">👁️ VISTO</button>
    <button class="btn-accion btn-guardar" onclick="guardarCambios()">💾 GUARDAR CAMBIOS</button>
    <button class="btn-accion btn-whatsapp" onclick="enviarWA()">🟢 ENVIAR WHATSAPP</button>
  </div>
</div>
</div>

<!-- MODAL GENERAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- IMAGEN FULLSCREEN -->
<div class="img-fullscreen" id="img-fullscreen">
  <button class="img-fs-close" onclick="cerrarFullscreen()">✕</button>
  <img id="img-fs-src" src="" alt="Cupón">
  <div class="img-fs-btns">
    <button class="btn-fs btn-fs-wa" onclick="compartirWA()">🟢 WhatsApp</button>
    <button class="btn-fs btn-fs-dl" onclick="descargarImg()">⬇️ Descargar</button>
  </div>
</div>

<script>
let usuario = '', provincias = [], tabActual = '', cupones = {}, currId = null, currImgUrl = '';

window.onload = () => {
  usuario    = sessionStorage.getItem('usuario');
  provincias = JSON.parse(sessionStorage.getItem('provincias') || '[]');
  if (!usuario) { window.location.href = '/'; return; }
  document.getElementById('lbl-usuario').textContent = usuario;
  crearTabs();
  cargarBalance();
};

function logout() { sessionStorage.clear(); window.location.href = '/'; }

// ── TABS ──
function crearTabs() {
  const nav  = document.getElementById('tabs-nav');
  const body = document.getElementById('tabs-body');
  const all  = ['✅ PAGOS HOY', ...provincias];
  all.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = p; btn.dataset.tab = p;
    btn.onclick = () => activarTab(p);
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content' + (i === 0 ? ' active' : '');
    div.id = 'tab-' + p;
    const ps = p.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    div.innerHTML =
      '<div class="search-bar"><input class="search-input" placeholder="Buscar afiliado..." oninput="buscarEn(\'' + ps + '\',this.value)"></div>' +
      '<div class="table-wrap"><table class="cupones"><thead><tr>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'id\')">ID</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'cuenta\')">N°</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'nombre\')">AFILIADO</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'monto\')">MONTO</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'cta\')">CTA</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'cuotas_pendientes\')" title="Cuotas pendientes del cliente">CUOTAS</th>' +
      '<th onclick="ordenarPor(\'' + ps + '\',\'fecha_cobro\')">FECHA</th>' +
      '<th>ESTADO</th>' +
      '</tr></thead><tbody id="tbody-' + p + '"></tbody></table></div>';
    body.appendChild(div);
  });
  tabActual = '✅ PAGOS HOY';
  cargarTab(tabActual);
}

function activarTab(p) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === p));
  document.querySelectorAll('.tab-content').forEach(d => d.classList.toggle('active', d.id === 'tab-' + p));
  tabActual = p;
  cargarTab(p);
}

async function cargarTab(p, buscar='') {
  const url = p === '✅ PAGOS HOY'
    ? '/api/cupones/hoy'
    : '/api/cupones?provincia=' + encodeURIComponent(p) + '&buscar=' + encodeURIComponent(buscar);
  try {
    const data = await (await fetch(url)).json();
    cupones[p] = data;
    renderTabla(p, data);
    cargarBalance();
  } catch(e) { console.error(e); }
}

function renderTabla(p, data) {
  const tbody = document.getElementById('tbody-' + p);
  if (!tbody) return;
  tbody.innerHTML = '';
  if (!data || !data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Sin registros</td></tr>';
    return;
  }
  data.forEach(r => {
    const tr = document.createElement('tr');
    const cp = r.cuotas_pendientes || 0;
    if (r.color === 'verde')  tr.className = 'row-verde';
    else if (cp >= 3)         tr.className = 'row-multi';
    else if (cp === 2)        tr.className = 'row-naranja';
    if (r.id === currId) tr.classList.add('selected');
    tr.onclick = () => cargarDetalle(r.id);

    const badge = r.estado === 'PAGADO'
      ? '<span class="badge-pagado">PAGADO</span>'
      : '<span class="badge-pend">PENDIENTE</span>';
    const cuotasBadge = cp >= 3
      ? '<span class="badge-multi">' + cp + '</span>'
      : cp === 2
        ? '<b style="color:#e67e22">' + cp + '</b>'
        : (cp > 0 ? cp : '');

    tr.innerHTML =
      '<td>' + r.id + '</td>' +
      '<td>' + (r.cuenta || '') + '</td>' +
      '<td style="font-weight:500">' + (r.nombre || '') + '</td>' +
      '<td>$' + (r.monto||0).toLocaleString('es-AR') + '</td>' +
      '<td>' + (r.cta || '') + '</td>' +
      '<td style="text-align:center">' + cuotasBadge + '</td>' +
      '<td>' + (r.fecha_cobro || '') + '</td>' +
      '<td>' + badge + '</td>';
    tbody.appendChild(tr);
  });
}

function buscarEn(p, val) { cargarTab(p, val); }

function ordenarPor(p, campo) {
  if (!cupones[p]) return;
  const asc = cupones[p]._orden !== campo;
  cupones[p].sort((a, b) => {
    let va = a[campo] ?? '', vb = b[campo] ?? '';
    if (!isNaN(Number(va)) && !isNaN(Number(vb))) { va = +va; vb = +vb; }
    return asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });
  cupones[p]._orden = asc ? campo : null;
  renderTabla(p, cupones[p]);
}

// ── DETALLE ──
async function cargarDetalle(id) {
  currId = id;
  document.querySelectorAll('table.cupones tr').forEach(tr => {
    tr.classList.toggle('selected', !!(tr.cells[0] && parseInt(tr.cells[0].textContent) === id));
  });

  try {
    const r = await (await fetch('/api/cupon/' + id)).json();
    document.getElementById('e-cta').value = r.cuenta || '';
    document.getElementById('e-nom').value = r.nombre || '';
    document.getElementById('e-mon').value = r.monto || '';
    document.getElementById('e-cuo').value = r.cta || '';
    document.getElementById('e-fec').value = r.fecha_cobro || '';
    document.getElementById('e-tel').value = r.telefono || '';
    document.getElementById('e-com').value = r.comentario || '';
    document.getElementById('e-pag').value = r.medio_pago || 'EFECTIVO';
    const pagado = r.estado === 'PAGADO';
    document.getElementById('sw-estado').checked = pagado;
    const lbl = document.getElementById('lbl-estado');
    lbl.textContent = pagado ? 'PAGADO' : 'PENDIENTE';
    lbl.className = 'switch-lbl ' + (pagado ? 'pagado' : 'pendiente');
  } catch(e) {}

  // Imagen — una sola llamada, sin loops
  currImgUrl = '';
  const visor = document.getElementById('visor-img');
  const ph = document.getElementById('visor-ph');
  const existImg = visor.querySelector('img');
  if (existImg) existImg.remove();
  ph.style.display = '';
  ph.textContent = '⏳ Cargando...';

  try {
    const ir = await fetch('/api/cupon/' + id + '/imagen');
    if (ir.ok) {
      const idata = await ir.json();
      if (idata.url) {
        currImgUrl = idata.url;
        const img = new Image();
        img.src = idata.url;
        img.style.cssText = 'width:100%;height:100%;object-fit:contain;';
        visor.insertBefore(img, ph);
        ph.style.display = 'none';
      } else {
        ph.textContent = 'Sin imagen';
      }
    } else {
      ph.textContent = 'Sin imagen';
    }
  } catch(e) { ph.textContent = 'Sin imagen'; }
}

// ── FULLSCREEN ──
function abrirFullscreen() {
  if (!currImgUrl) return;
  document.getElementById('img-fs-src').src = currImgUrl;
  document.getElementById('img-fullscreen').classList.add('open');
}
function cerrarFullscreen() {
  document.getElementById('img-fullscreen').classList.remove('open');
}
document.getElementById('img-fullscreen').addEventListener('click', function(e) {
  if (e.target === this) cerrarFullscreen();
});
function compartirWA() {
  const tel = document.getElementById('e-tel').value.replace(/\D/g, '');
  const nombre = document.getElementById('e-nom').value;
  if (tel) {
    const msg = encodeURIComponent('Hola ' + nombre + '! Le enviamos su cupón Dental White: ' + currImgUrl);
    window.open('https://wa.me/' + tel + '?text=' + msg, '_blank');
  } else {
    navigator.clipboard.writeText(currImgUrl)
      .then(() => alert('URL copiada. Pegala en WhatsApp.'))
      .catch(() => alert('URL: ' + currImgUrl));
  }
}
function descargarImg() {
  if (!currImgUrl) return;
  const a = document.createElement('a');
  a.href = currImgUrl; a.download = 'cupon_' + (currId||'') + '.jpg'; a.target = '_blank';
  a.click();
}

// ── SWITCH ──
function toggleEstado() {
  const pagado = document.getElementById('sw-estado').checked;
  const lbl = document.getElementById('lbl-estado');
  lbl.textContent = pagado ? 'PAGADO' : 'PENDIENTE';
  lbl.className = 'switch-lbl ' + (pagado ? 'pagado' : 'pendiente');
}

// ── ACCIONES ──
async function registrarPago() {
  if (!currId) return alert('Seleccioná un cupón');
  const fd = new FormData();
  fd.append('medio_pago', document.getElementById('e-pag').value);
  fd.append('comentario', document.getElementById('e-com').value);
  await fetch('/api/cupon/' + currId + '/pago', { method: 'POST', body: fd });
  cargarTab(tabActual);
}
async function marcarVisto() {
  if (!currId) return;
  await fetch('/api/cupon/' + currId + '/visto', { method: 'POST' });
}
async function guardarCambios() {
  if (!currId) return alert('Seleccioná un cupón');
  const fd = new FormData();
  ['cta','nom','mon','cuo','fec','tel','com'].forEach(() => {});
  fd.append('cuenta',      document.getElementById('e-cta').value);
  fd.append('nombre',      document.getElementById('e-nom').value);
  fd.append('monto',       document.getElementById('e-mon').value);
  fd.append('cta',         document.getElementById('e-cuo').value);
  fd.append('fecha_cobro', document.getElementById('e-fec').value);
  fd.append('telefono',    document.getElementById('e-tel').value);
  fd.append('comentario',  document.getElementById('e-com').value);
  await fetch('/api/cupon/' + currId + '/guardar', { method: 'POST', body: fd });
  cargarTab(tabActual);
}
function enviarWA() {
  const tel = document.getElementById('e-tel').value.replace(/\D/g, '');
  const msg = encodeURIComponent(document.getElementById('e-msg').value);
  if (!tel) return alert('Sin número de WhatsApp');
  window.open('https://wa.me/' + tel + '?text=' + msg, '_blank');
}

// ── BALANCE ──
async function cargarBalance() {
  if (!provincias.length) return;
  try {
    const data = await (await fetch('/api/balance?provincias=' + encodeURIComponent(provincias.join(',')))).json();
    const tbody = document.querySelector('#tabla-balance tbody');
    tbody.innerHTML = '';
    let total = 0;
    data.forEach(d => {
      total += d.cobrado;
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td style="font-size:10px;font-weight:700">' + d.provincia.substring(0,7) + '</td>' +
        '<td>' + d.cant + '</td>' +
        '<td>$' + (d.inicial||0).toLocaleString('es-AR') + '</td>' +
        '<td>$' + (d.cobrado||0).toLocaleString('es-AR') + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('lbl-caja').textContent = '$' + total.toLocaleString('es-AR');
  } catch(e) {}
}

// ── SUBIR PDF ──
function clickSubirPDF() {
  if (tabActual === '✅ PAGOS HOY') return alert('Seleccioná una provincia primero');
  document.getElementById('input-pdf').click();
}

async function subirPDF(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const setP = (w, msg) => {
    document.getElementById('progress-fill').style.width = w;
    document.getElementById('progress-lbl').textContent = msg;
  };

  setP('3%', 'Enviando PDF...');
  let tareaId;
  try {
    const fd = new FormData();
    fd.append('provincia', tabActual);
    fd.append('archivo', file);
    const res = await fetch('/api/subir_pdf', { method: 'POST', body: fd });
    if (!res.ok) { setP('0%', '❌ Error al subir'); return; }
    const data = await res.json();
    tareaId = data.tarea_id;
  } catch(e) { setP('0%', '❌ Error de conexión'); return; }

  setP('5%', 'Iniciando...');

  const interval = setInterval(async () => {
    try {
      const pd = await (await fetch('/api/progreso/' + tareaId)).json();
      if (pd.estado === 'listo' || pd.estado === 'error') {
        clearInterval(interval);
        if (pd.estado === 'listo') {
          const s = pd.saltados ? ' (' + pd.saltados + ' ya existían)' : '';
          setP('100%', '✅ ' + (pd.detectados||0) + ' cupones' + s);
          setTimeout(() => cargarTab(tabActual), 500);
        } else {
          setP('0%', '❌ ' + (pd.error || 'Error'));
        }
      } else if (pd.estado === 'imagenes') {
        const pct = pd.img_total > 0 ? Math.round(70 + (pd.img_ok / pd.img_total) * 28) : 90;
        setP(pct + '%', '🖼️ Imágenes ' + (pd.img_ok||0) + '/' + (pd.img_total||0));
      } else {
        const pct = pd.total > 0 ? Math.round(5 + (pd.pagina / pd.total) * 65) : 10;
        setP(pct + '%', pd.total > 0
          ? '📄 Pág ' + pd.pagina + '/' + pd.total + ' — ' + (pd.detectados||0) + ' detectados'
          : 'Analizando...');
      }
    } catch(e) {}
  }, 700);
}

// ── AGREGAR MANUAL ──
async function agregarManual() {
  if (tabActual === '✅ PAGOS HOY') return alert('Seleccioná una provincia primero');
  const fd = new FormData();
  fd.append('provincia', tabActual);
  await fetch('/api/cupon/agregar', { method: 'POST', body: fd });
  cargarTab(tabActual);
}

// ── ELIMINAR ──
async function eliminarCupon() {
  if (!currId) return alert('Seleccioná un cupón');
  if (!confirm('¿Eliminar este cupón?')) return;
  await fetch('/api/cupon/' + currId, { method: 'DELETE' });
  currId = null; currImgUrl = '';
  document.getElementById('visor-ph').textContent = 'Sin imagen';
  cargarTab(tabActual);
}

// ── MODAL ──
function abrirModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function cerrarModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) cerrarModal();
});

// ── INICIAR MES ──
async function mostrarIniciarMes() {
  const data = await (await fetch('/api/iniciar_mes/preview?provincias=' + encodeURIComponent(provincias.join(',')))).json();
  const rows = data.map(d => '<tr><td>' + d.provincia + '</td><td>' + d.clientes + '</td><td>' + d.cupones + '</td><td>$' + (d.monto||0).toLocaleString('es-AR') + '</td></tr>').join('');
  abrirModal('<h2>📅 Iniciar Mes</h2><table class="modal-table"><thead><tr><th>Provincia</th><th>Clientes</th><th>Cupones</th><th>Monto</th></tr></thead><tbody>' + rows + '</tbody></table><div class="modal-footer"><button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button></div>');
}

// ── CIERRE ──
async function mostrarCierre() {
  const data = await (await fetch('/api/cierre?provincias=' + encodeURIComponent(provincias.join(',')))).json();
  const rows = data.provincias.map(d => '<tr><td>' + d.provincia + '</td><td>' + d.cobrado_cant + ' — $' + (d.cobrado_monto||0).toLocaleString('es-AR') + '</td><td>' + d.pendiente_cant + ' — $' + (d.pendiente_monto||0).toLocaleString('es-AR') + '</td></tr>').join('');
  const metRows = Object.entries(data.metodos).map(([m,v]) => '<tr><td>' + m + '</td><td>' + v.cant + '</td><td>$' + (v.monto||0).toLocaleString('es-AR') + '</td></tr>').join('');
  abrirModal(
    '<h2>📝 Cierre del Día</h2>' +
    '<table class="modal-table" style="margin-bottom:14px"><thead><tr><th>Provincia</th><th>Cobrado</th><th>Pendiente</th></tr></thead><tbody>' + rows + '</tbody></table>' +
    '<p style="font-size:11px;color:var(--muted);margin-bottom:6px">Por método:</p>' +
    '<table class="modal-table" style="margin-bottom:14px"><thead><tr><th>Método</th><th>Cant</th><th>Monto</th></tr></thead><tbody>' + metRows + '</tbody></table>' +
    '<div class="modal-footer">' +
    '<button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button>' +
    '<button class="btn-modal btn-modal-azul" onclick="descargarCierreTxt()">💾 .txt</button>' +
    '<button class="btn-modal btn-modal-rojo" onclick="confirmarCierre()">🗑️ Borrar cupones</button>' +
    '</div>'
  );
}
async function confirmarCierre() {
  if (!confirm('¿Seguro? Borrará TODOS los cupones de tus provincias.')) return;
  const fd = new FormData(); fd.append('provincias', provincias.join(','));
  await fetch('/api/cierre/confirmar', { method: 'POST', body: fd });
  cerrarModal(); cargarTab(tabActual);
}

// ── BALANCE DIARIO ──
async function mostrarBalanceDiario() {
  const d = await (await fetch('/api/balance_diario')).json();
  const rows = d.clientes.map(c => '<tr><td>' + c.nombre + '</td><td>' + c.provincia + '</td><td>' + c.cuotas_str + '</td><td>$' + (c.total||0).toLocaleString('es-AR') + '</td><td>' + c.medio + '</td></tr>').join('');
  const stats = [['TOTAL',d.total_general,'#1a9e6e'],['EFECTIVO',d.total_efectivo,'#27ae60'],['TRANSFER.',d.total_transfer,'#2471a3'],['MERC.PAGO',d.total_mp,'#8e44ad'],['TARJETA',d.total_tarjeta,'#e67e22'],['CLIENTES',d.total_clientes,'#7f8c8d']];
  const sh = stats.map(([l,v,c]) => '<div style="background:var(--card);border-radius:8px;padding:9px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">' + l + '</div><div style="font-size:15px;font-weight:700;color:' + c + '">' + (l==='CLIENTES'?v:'$'+(v||0).toLocaleString('es-AR')) + '</div></div>').join('');
  abrirModal(
    '<h2>📊 Balance — ' + d.fecha + '</h2>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">' + sh + '</div>' +
    '<table class="modal-table"><thead><tr><th>Afiliado</th><th>Provincia</th><th>Cuotas</th><th>Total</th><th>Método</th></tr></thead><tbody>' + rows + '</tbody></table>' +
    '<div class="modal-footer"><button class="btn-modal btn-modal-cancel" onclick="cerrarModal()">Cerrar</button><button class="btn-modal btn-modal-azul" onclick="descargarBalanceTxt()">💾 .txt</button></div>'
  );
}

// ── DESCARGA TXT ──
function descargarBalanceTxt() { const a=document.createElement('a'); a.href='/api/balance_diario/txt'; a.click(); }
function descargarCierreTxt() { const a=document.createElement('a'); a.href='/api/cierre/txt?provincias='+encodeURIComponent(provincias.join(',')); a.click(); }
