<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DENTAL WHITE - Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#18a96e; --verde-l:rgba(24,169,110,.13);
  --naranja:#e67e22; --naranja-l:rgba(230,126,34,.13);
  --rojo:#e74c3c; --rojo-l:rgba(231,76,60,.13);
  --azul:#2471a3; --azul-l:rgba(36,113,163,.1);
  --bg:#ddeef8; --panel:#fff; --card:#eaf4fb;
  --border:#b3d4e8; --text:#16354a; --muted:#5b8da6;
  --hdr:#c8e3f4;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{background:var(--azul);padding:9px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;color:#fff}
.user-info{font-size:12px;color:rgba(255,255,255,.75);margin-left:auto}
.user-info span{color:#fff;font-weight:700}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:4px 11px;font-size:12px;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(255,255,255,.15);border-color:#fff}

/* LAYOUT */
.layout{display:grid;grid-template-columns:272px 1fr 390px;flex:1;overflow:hidden}

/* PANEL IZQ */
.pizq{background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pizq-scroll{flex:1;overflow-y:auto;padding:13px}
.stitle{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}

.bal-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.bal-table th{color:var(--muted);font-weight:700;padding:3px 5px;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.8px;text-align:left}
.bal-table td{padding:4px 5px;border-bottom:1px solid rgba(0,0,0,.05)}
.bal-table tr:last-child td{border-bottom:none}

.caja{background:var(--verde-l);border:1px solid rgba(24,169,110,.3);border-radius:9px;padding:9px 12px;margin-bottom:12px;text-align:center}
.caja .lbl{font-size:9px;color:var(--verde);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.caja .val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--verde)}

.prog-wrap{margin-bottom:10px}
.prog-bg{background:var(--border);border-radius:4px;height:7px;overflow:hidden}
.prog-fill{height:100%;background:var(--verde);border-radius:4px;transition:width .4s;width:0%}
.prog-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;min-height:15px}

.btn-side{width:100%;border:none;border-radius:7px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:5px;display:flex;align-items:center;gap:7px;transition:opacity .18s,transform .1s;letter-spacing:.2px}
.btn-side:hover{opacity:.85;transform:translateY(-1px)}
.bs-verde{background:var(--verde);color:#fff}
.bs-azul{background:var(--azul);color:#fff}
.bs-gris{background:#55687a;color:#fff}
.bs-naranja{background:var(--naranja);color:#fff}
.bs-rojo{background:var(--rojo);color:#fff}
.bs-oscuro{background:#243447;color:#fff}

.leyenda{font-size:10px;color:var(--muted);text-align:center;padding:7px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-right:3px}
.dv{background:var(--verde)} .dn{background:var(--naranja)} .dr{background:var(--rojo)}

/* PANEL CENTRAL */
.pcen{display:flex;flex-direction:column;overflow:hidden}
.tabs-nav{background:var(--hdr);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 15px;font-size:11px;font-weight:700;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:.18s;white-space:nowrap;letter-spacing:.3px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--azul);border-bottom-color:var(--azul)}

.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column}
.tab-content.active{display:flex}

.search-bar{padding:9px 13px;border-bottom:1px solid var(--border);background:var(--hdr)}
.search-inp{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 11px;outline:none;transition:.2s}
.search-inp:focus{border-color:var(--azul);box-shadow:0 0 0 3px var(--azul-l)}

.tbl-wrap{flex:1;overflow-y:auto}
table.t{width:100%;border-collapse:collapse;font-size:12px}
table.t th{background:var(--hdr);color:var(--muted);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:8px 9px;position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;border-bottom:2px solid var(--border)}
table.t th:hover{color:var(--text)}
table.t td{padding:7px 9px;border-bottom:1px solid rgba(0,0,0,.06)}
table.t tr{cursor:pointer;transition:background .12s}
table.t tr:hover td{background:rgba(0,0,0,.025)}
table.t tr.sel td{background:rgba(24,169,110,.15)!important}

/* Colores cuotas - DISTINTOS y claros */
.rw-verde td  {background:rgba(24,169,110,.07)!important}
.rw-naranja td{background:rgba(230,126,34,.10)!important}
.rw-rojo td   {background:rgba(231,76,60,.10)!important}

.b-pag{background:var(--verde-l);color:var(--verde);font-size:9px;font-weight:800;padding:2px 7px;border-radius:12px;letter-spacing:.3px}
.b-pen{background:var(--rojo-l);color:var(--rojo);font-size:9px;font-weight:800;padding:2px 7px;border-radius:12px;letter-spacing:.3px}

/* Badge cuotas */
.cq1{color:var(--muted);font-size:11px}
.cq2{background:var(--naranja-l);color:var(--naranja);font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px}
.cq3{background:var(--rojo-l);color:var(--rojo);font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px}

/* PANEL DER */
.pder{background:var(--panel);border-left:2px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}

/* VISOR IMAGEN */
.visor{background:#1a2430;height:210px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;cursor:pointer}
.visor img{width:100%;height:100%;object-fit:contain;display:block}
.visor-ph{color:#6b8fa6;font-size:13px;user-select:none}
.visor-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;gap:10px;opacity:0;transition:.2s;pointer-events:none}
.visor:hover .visor-overlay{opacity:1}
.visor-overlay.has-img{pointer-events:auto}
.btn-vo{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;backdrop-filter:blur(4px)}
.btn-vo:hover{background:rgba(255,255,255,.28)}

.pder-body{padding:13px;flex:1}
.fg{margin-bottom:9px}
.fg label{display:block;font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 9px;outline:none;transition:.2s;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--azul);box-shadow:0 0 0 3px var(--azul-l)}
.fg textarea{resize:vertical;min-height:50px}

.sw-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding:8px 10px;background:var(--card);border-radius:7px;border:1px solid var(--border)}
.sw{position:relative;width:40px;height:22px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#b0bec5;border-radius:22px;cursor:pointer;transition:.2s}
.sl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.sl{background:var(--verde)}
input:checked+.sl::before{transform:translateX(18px)}
.sw-lbl{font-size:12px;font-weight:800;letter-spacing:.3px}
.sw-lbl.pag{color:var(--verde)} .sw-lbl.pen{color:var(--rojo)}

.btn-a{width:100%;border:none;border-radius:7px;padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:5px;transition:opacity .18s,transform .1s;letter-spacing:.2px}
.btn-a:hover{opacity:.87;transform:translateY(-1px)}
.ba-reg{background:var(--verde);color:#fff;padding:11px;font-size:13px}
.ba-vis{background:var(--naranja);color:#fff}
.ba-gua{background:#55687a;color:#fff}
.ba-wa{background:#25d366;color:#fff}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:22px;max-width:560px;width:92%;max-height:82vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;margin-bottom:14px}
.m-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.m-table{width:100%;border-collapse:collapse;font-size:12px}
.m-table th{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:5px 9px;border-bottom:1px solid var(--border);text-align:left}
.m-table td{padding:7px 9px;border-bottom:1px solid rgba(0,0,0,.06)}
.m-footer{margin-top:16px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-m{padding:8px 16px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.bm-cancel{background:var(--card);color:var(--text);border:1px solid var(--border)}
.bm-azul{background:var(--azul);color:#fff}
.bm-rojo{background:var(--rojo);color:#fff}

/* FULLSCREEN imagen */
.fs-ov{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.fs-ov.open{display:flex}
.fs-ov img{max-width:92vw;max-height:74vh;border-radius:7px;box-shadow:0 6px 40px rgba(0,0,0,.6)}
.fs-close{position:absolute;top:14px;right:18px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1}
.fs-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-fs{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-fs:hover{opacity:.87;transform:translateY(-1px)}
.bfs-wa{background:#25d366;color:#fff}
.bfs-cp{background:#fff;color:#222}
.bfs-dl{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}

/* Copy toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2430;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🦷 DENTAL WHITE</div>
  <div class="user-info">Sesión: <span id="lbl-user">-</span></div>
  <button class="btn-logout" onclick="logout()">Salir</button>
</div>

<div class="layout">

<!-- IZQ -->
<div class="pizq">
  <div class="pizq-scroll">
    <div class="stitle">📊 Balance</div>
    <table class="bal-table" id="t-bal">
      <thead><tr><th>Prov</th><th>Clientes</th><th>Inicial</th><th>Cobrado</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="caja">
      <div class="lbl">CAJA DEL DÍA</div>
      <div class="val" id="lbl-caja">$0</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-lbl" id="prog-lbl"></div>
    </div>
    <button class="btn-side bs-verde" onclick="clickPDF()">📥 SUBIR PDF</button>
    <input type="file" id="inp-pdf" accept=".pdf" style="display:none" onchange="subirPDF(event)">
    <button class="btn-side bs-azul" onclick="agregarManual()">➕ AGREGAR MANUAL</button>
    <button class="btn-side bs-oscuro" onclick="verIniciarMes()">📅 INICIAR MES</button>
    <button class="btn-side bs-gris" onclick="verCierre()">📝 CIERRE</button>
    <button class="btn-side bs-naranja" onclick="verBalance()">📊 BALANCE DIARIO</button>
    <button class="btn-side bs-rojo" onclick="eliminar()">❌ ELIMINAR CUPÓN</button>
  </div>
  <div class="leyenda">
    <span><span class="dot dv"></span>Listo/Pagado</span>
    <span><span class="dot dn"></span>2 cuotas</span>
    <span><span class="dot dr"></span>3+ cuotas</span>
  </div>
</div>

<!-- CENTRAL -->
<div class="pcen">
  <div class="tabs-nav" id="tabs-nav"></div>
  <div id="tabs-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
</div>

<!-- DER -->
<div class="pder">
  <div class="visor" id="visor" onclick="abrirFS()">
    <span class="visor-ph" id="v-ph">Sin imagen</span>
    <div class="visor-overlay" id="v-ov">
      <button class="btn-vo" onclick="event.stopPropagation();abrirFS()">🔍 Ver</button>
      <button class="btn-vo" onclick="event.stopPropagation();copiarImg()">📋 Copiar</button>
    </div>
  </div>
  <div class="pder-body">
    <div class="fg"><label>N° AFILIADO</label><input id="e-cta" type="text"></div>
    <div class="fg"><label>AFILIADO</label><input id="e-nom" type="text"></div>
    <div class="fg"><label>MONTO $</label><input id="e-mon" type="number"></div>
    <div class="fg"><label>CUOTA (CTA)</label><input id="e-cuo" type="text"></div>
    <div class="fg"><label>FECHA COBRO</label><input id="e-fec" type="text"></div>
    <div class="fg"><label>WHATSAPP</label><input id="e-tel" type="text"></div>
    <div class="fg">
      <label>MÉTODO DE PAGO</label>
      <select id="e-pag">
        <option>EFECTIVO</option><option>TRANSFERENCIA</option>
        <option>MERCADO PAGO</option><option>TARJETA</option>
      </select>
    </div>
    <div class="sw-row">
      <label class="sw"><input type="checkbox" id="sw" onchange="toggleSW()"><span class="sl"></span></label>
      <span class="sw-lbl pen" id="lbl-sw">PENDIENTE</span>
    </div>
    <div class="fg"><label>COMENTARIO</label><input id="e-com" type="text"></div>
    <div class="fg">
      <label>MENSAJE WHATSAPP</label>
      <textarea id="e-msg">Hola! Le informamos que su cupón de pago Dental White está disponible. Ante cualquier consulta no dude en contactarnos.</textarea>
    </div>
    <button class="btn-a ba-reg" onclick="regPago()">✅ REGISTRAR PAGO</button>
    <button class="btn-a ba-vis" onclick="marcarVisto()">👁️ VISTO</button>
    <button class="btn-a ba-gua" onclick="guardar()">💾 GUARDAR CAMBIOS</button>
    <button class="btn-a ba-wa" onclick="enviarWA()">🟢 ENVIAR WHATSAPP</button>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal-ov">
  <div class="modal">
    <button class="m-close" onclick="cerrarModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- FULLSCREEN -->
<div class="fs-ov" id="fs-ov">
  <button class="fs-close" onclick="cerrarFS()">✕</button>
  <img id="fs-img" src="" alt="Cupón">
  <div class="fs-btns">
    <button class="btn-fs bfs-wa" onclick="compartirWA()">🟢 WhatsApp</button>
    <button class="btn-fs bfs-cp" onclick="copiarImg()">📋 Copiar imagen</button>
    <button class="btn-fs bfs-dl" onclick="descargarImg()">⬇️ Descargar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let usuario='', provincias=[], tabActual='', cupones={}, currId=null, currImgUrl='';

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  usuario    = sessionStorage.getItem('usuario');
  provincias = JSON.parse(sessionStorage.getItem('provincias') || '[]');
  if (!usuario) { window.location.href='/'; return; }
  document.getElementById('lbl-user').textContent = usuario;
  crearTabs();
  cargarBalance();
};
function logout(){ sessionStorage.clear(); window.location.href='/'; }

// ── TABS ──────────────────────────────────────────────────────────────────────
function crearTabs(){
  const nav  = document.getElementById('tabs-nav');
  const body = document.getElementById('tabs-body');
  const all  = ['✅ PAGOS HOY', ...provincias];
  all.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = p; btn.dataset.tab = p;
    btn.onclick = () => activarTab(p);
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = 'tab-'+p;
    const ps = p.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    div.innerHTML =
      '<div class="search-bar"><input class="search-inp" placeholder="Buscar afiliado..." oninput="buscar(\''+ps+'\',this.value)"></div>'+
      '<div class="tbl-wrap"><table class="t"><thead><tr>'+
      '<th onclick="sort(\''+ps+'\',\'id\')">ID</th>'+
      '<th onclick="sort(\''+ps+'\',\'cuenta\')">N°</th>'+
      '<th onclick="sort(\''+ps+'\',\'nombre\')">AFILIADO</th>'+
      '<th onclick="sort(\''+ps+'\',\'monto\')">MONTO</th>'+
      '<th onclick="sort(\''+ps+'\',\'cta\')">CTA</th>'+
      '<th onclick="sort(\''+ps+'\',\'cuotas_pendientes\')" title="Cuotas pendientes">CUOTAS</th>'+
      '<th onclick="sort(\''+ps+'\',\'fecha_cobro\')">FECHA</th>'+
      '<th>ESTADO</th>'+
      '</tr></thead><tbody id="tb-'+p+'"></tbody></table></div>';
    body.appendChild(div);
  });
  tabActual = '✅ PAGOS HOY';
  cargarTab(tabActual);
}

function activarTab(p){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===p));
  document.querySelectorAll('.tab-content').forEach(d=>d.classList.toggle('active',d.id==='tab-'+p));
  tabActual = p;
  cargarTab(p);
}

async function cargarTab(p, q=''){
  const url = p==='✅ PAGOS HOY'
    ? '/api/cupones/hoy'
    : '/api/cupones?provincia='+encodeURIComponent(p)+'&buscar='+encodeURIComponent(q);
  try{
    const data = await (await fetch(url)).json();
    cupones[p] = data;
    renderTabla(p, data);
    cargarBalance();
  }catch(e){console.error(e)}
}

function renderTabla(p, data){
  const tb = document.getElementById('tb-'+p);
  if(!tb) return;
  tb.innerHTML = '';
  if(!data||!data.length){
    tb.innerHTML='<tr><td colspan="8" class="empty">Sin registros</td></tr>';
    return;
  }
  data.forEach(r => {
    const tr = document.createElement('tr');
    const cp = r.cuotas_pendientes||0;
    if(r.color==='verde')    tr.className='rw-verde';
    else if(r.color==='rojo')    tr.className='rw-rojo';
    else if(r.color==='naranja') tr.className='rw-naranja';
    if(r.id===currId) tr.classList.add('sel');
    tr.onclick = ()=>cargarDetalle(r.id);

    const badge = r.estado==='PAGADO'
      ? '<span class="b-pag">PAGADO</span>'
      : '<span class="b-pen">PENDIENTE</span>';

    let cqBadge = '';
    if(cp===1) cqBadge='<span class="cq1">1</span>';
    else if(cp===2) cqBadge='<span class="cq2">2</span>';
    else if(cp>=3) cqBadge='<span class="cq3">'+cp+'</span>';

    tr.innerHTML =
      '<td>'+r.id+'</td>'+
      '<td>'+esc(r.cuenta)+'</td>'+
      '<td style="font-weight:600">'+esc(r.nombre)+'</td>'+
      '<td>$'+(r.monto||0).toLocaleString('es-AR')+'</td>'+
      '<td>'+esc(r.cta)+'</td>'+
      '<td style="text-align:center">'+cqBadge+'</td>'+
      '<td>'+esc(r.fecha_cobro)+'</td>'+
      '<td>'+badge+'</td>';
    tb.appendChild(tr);
  });
}
function esc(v){ return v||''; }
function buscar(p,v){ cargarTab(p,v); }
function sort(p,c){
  if(!cupones[p]) return;
  const asc = cupones[p]._sort!==c;
  cupones[p].sort((a,b)=>{
    let va=a[c]??'', vb=b[c]??'';
    if(!isNaN(+va)&&!isNaN(+vb)){va=+va;vb=+vb;}
    return asc?(va>vb?1:-1):(va<vb?1:-1);
  });
  cupones[p]._sort = asc?c:null;
  renderTabla(p,cupones[p]);
}

// ── DETALLE ───────────────────────────────────────────────────────────────────
async function cargarDetalle(id){
  currId = id;
  document.querySelectorAll('table.t tr').forEach(tr=>{
    tr.classList.toggle('sel',!!(tr.cells[0]&&parseInt(tr.cells[0].textContent)===id));
  });
  try{
    const r = await (await fetch('/api/cupon/'+id)).json();
    document.getElementById('e-cta').value = r.cuenta||'';
    document.getElementById('e-nom').value = r.nombre||'';
    document.getElementById('e-mon').value = r.monto||'';
    document.getElementById('e-cuo').value = r.cta||'';
    document.getElementById('e-fec').value = r.fecha_cobro||'';
    document.getElementById('e-tel').value = r.telefono||'';
    document.getElementById('e-com').value = r.comentario||'';
    document.getElementById('e-pag').value = r.medio_pago||'EFECTIVO';
    const pag = r.estado==='PAGADO';
    document.getElementById('sw').checked = pag;
    const lbl = document.getElementById('lbl-sw');
    lbl.textContent = pag?'PAGADO':'PENDIENTE';
    lbl.className = 'sw-lbl '+(pag?'pag':'pen');
  }catch(e){}

  // Cargar imagen — una sola vez, sin retry
  currImgUrl = '';
  const visor  = document.getElementById('visor');
  const ph     = document.getElementById('v-ph');
  const ov     = document.getElementById('v-ov');
  const oldImg = visor.querySelector('img');
  if(oldImg) oldImg.remove();
  ph.style.display='';
  ph.textContent='⏳ Cargando...';
  ov.classList.remove('has-img');

  try{
    const ir = await fetch('/api/cupon/'+id+'/imagen');
    if(ir.ok){
      const {url} = await ir.json();
      if(url){
        currImgUrl = url;
        const img = new Image();
        img.src = url;
        img.style.cssText='width:100%;height:100%;object-fit:contain;';
        visor.insertBefore(img, ph);
        ph.style.display='none';
        ov.classList.add('has-img');
      } else { ph.textContent='Sin imagen'; }
    } else { ph.textContent='Sin imagen'; }
  }catch(e){ ph.textContent='Sin imagen'; }
}

// ── FULLSCREEN ────────────────────────────────────────────────────────────────
function abrirFS(){
  if(!currImgUrl) return;
  document.getElementById('fs-img').src = currImgUrl;
  document.getElementById('fs-ov').classList.add('open');
}
function cerrarFS(){ document.getElementById('fs-ov').classList.remove('open'); }
document.getElementById('fs-ov').addEventListener('click',function(e){
  if(e.target===this) cerrarFS();
});

function compartirWA(){
  const tel = document.getElementById('e-tel').value.replace(/\D/g,'');
  const nom = document.getElementById('e-nom').value;
  if(tel){
    const msg = encodeURIComponent('Hola '+nom+'! Le enviamos su cupón Dental White 🦷\n'+currImgUrl);
    window.open('https://wa.me/549'+tel+'?text='+msg,'_blank');
  } else {
    // Sin teléfono: copiar URL
    copiarImg();
  }
}

async function copiarImg(){
  if(!currImgUrl){ mostrarToast('Sin imagen'); return; }
  try{
    // Intentar copiar imagen como blob
    const resp = await fetch(currImgUrl);
    const blob = await resp.blob();
    await navigator.clipboard.write([
      new ClipboardItem({[blob.type]: blob})
    ]);
    mostrarToast('✅ Imagen copiada — pegá en WhatsApp');
  }catch(e){
    // Fallback: copiar URL
    try{
      await navigator.clipboard.writeText(currImgUrl);
      mostrarToast('✅ URL copiada — pegá en WhatsApp');
    }catch(e2){
      mostrarToast('❌ No se pudo copiar');
    }
  }
}

function descargarImg(){
  if(!currImgUrl) return;
  const a = document.createElement('a');
  a.href = currImgUrl;
  a.download = 'cupon_'+(currId||'')+'.jpg';
  a.target='_blank'; a.click();
}

function mostrarToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── SUBIR PDF ─────────────────────────────────────────────────────────────────
function clickPDF(){
  if(tabActual==='✅ PAGOS HOY') return alert('Seleccioná una provincia primero');
  document.getElementById('inp-pdf').click();
}

async function subirPDF(event){
  const file = event.target.files[0];
  if(!file) return;
  event.target.value='';
  const fill = document.getElementById('prog-fill');
  const lbl  = document.getElementById('prog-lbl');
  const setP = (w,msg)=>{ fill.style.width=w; lbl.textContent=msg; };

  setP('3%','Enviando PDF...');
  let tareaId;
  try{
    const fd=new FormData();
    fd.append('provincia',tabActual);
    fd.append('archivo',file);
    const res=await fetch('/api/subir_pdf',{method:'POST',body:fd});
    if(!res.ok){ setP('0%','❌ Error al subir'); return; }
    tareaId=(await res.json()).tarea_id;
  }catch(e){ setP('0%','❌ Error de conexión'); return; }

  setP('5%','Iniciando...');

  const iv = setInterval(async()=>{
    try{
      const pd=await(await fetch('/api/progreso/'+tareaId)).json();
      if(pd.estado==='listo'||pd.estado==='error'){
        clearInterval(iv);
        if(pd.estado==='listo'){
          const s=pd.saltados?' ('+pd.saltados+' ya existían)':'';
          setP('100%','✅ '+(pd.detectados||0)+' cupones'+s);
          setTimeout(()=>cargarTab(tabActual),600);
        } else { setP('0%','❌ '+(pd.error||'Error')); }
      } else if(pd.estado==='imagenes'){
        const pct=pd.img_total>0?Math.round(70+(pd.img_ok/pd.img_total)*28):88;
        setP(pct+'%','🖼️ Imágenes '+(pd.img_ok||0)+'/'+(pd.img_total||0));
      } else {
        const pct=pd.total>0?Math.round(5+(pd.pagina/pd.total)*65):10;
        setP(pct+'%',pd.total>0
          ?'📄 Pág '+(pd.pagina||0)+'/'+pd.total+' — '+(pd.detectados||0)+' detectados'
          :'Analizando PDF...');
      }
    }catch(e){}
  },700);
}

// ── CIERRE ────────────────────────────────────────────────────────────────────

  const data=await(await fetch('/api/cierre?provincias='+encodeURIComponent(provincias.join(',')))).json();
  const rows=data.provincias.map(d=>'<tr><td>'+d.provincia+'</td><td>'+d.cobrado_cant+' — $'+(d.cobrado_monto||0).toLocaleString('es-AR')+'</td><td>'+d.pendiente_cant+' — $'+(d.pendiente_monto||0).toLocaleString('es-AR')+'</td></tr>').join('');
  const met=Object.entries(data.metodos).map(([m,v])=>'<tr><td>'+m+'</td><td>'+v.cant+'</td><td>$'+(v.monto||0).toLocaleString('es-AR')+'</td></tr>').join('')||'<tr><td colspan="3" style="color:var(--muted);padding:10px">Sin pagos hoy</td></tr>';

    '<table class="m-table" style="margin-bottom:12px"><thead><tr><th>Provincia</th><th>Cobrado</th><th>Pendiente</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<p style="font-size:10px;color:var(--muted);margin-bottom:6px">Por método:</p>'+
    '<table class="m-table" style="margin-bottom:12px"><thead><tr><th>Método</th><th>Cant</th><th>Monto</th></tr></thead><tbody>'+met+'</tbody></table>'+
    '<div class="m-footer">'+
    '<button class="btn-m bm-cancel" onclick="cerrarModal()">Cancelar</button>'+
    '<button class="btn-m bm-azul" onclick="dlCierre()">💾 .txt</button>'+
    '<button class="btn-m bm-rojo" onclick="confCierre()">🗑️ Confirmar borrado</button>'+
    '</div>');
}
async function confCierre(){
  if(!confirm('¿Borrar TODOS los cupones de tus provincias?')) return;
  const fd=new FormData(); fd.append('provincias',provincias.join(','));
  await fetch('/api/cierre/confirmar',{method:'POST',body:fd});
  cerrarModal(); currId=null; currImgUrl='';
  cargarTab(tabActual); cargarBalance();
}

// ── BALANCE DIARIO ────────────────────────────────────────────────────────────
async function verBalance(){
  const d=await(await fetch('/api/balance_diario')).json();
  const rows=d.clientes.map(c=>'<tr><td>'+c.nombre+'</td><td>'+c.provincia+'</td><td>'+c.cuotas_str+'</td><td>$'+(c.total||0).toLocaleString('es-AR')+'</td><td>'+c.medio+'</td></tr>').join('')||'<tr><td colspan="5" style="color:var(--muted);padding:10px">Sin pagos hoy</td></tr>';
  const stats=[['TOTAL',d.total_general,'#18a96e'],['EFECTIVO',d.total_efectivo,'#27ae60'],['TRANSFER.',d.total_transfer,'#2471a3'],['MERC.PAGO',d.total_mp,'#8e44ad'],['TARJETA',d.total_tarjeta,'#e67e22'],['CLIENTES',d.total_clientes,'#7f8c8d']];
  const sh=stats.map(([l,v,c])=>'<div style="background:var(--card);border-radius:7px;padding:9px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">'+l+'</div><div style="font-size:15px;font-weight:800;color:'+c+'">'+( l==='CLIENTES'?v:'$'+(+v||0).toLocaleString('es-AR'))+'</div></div>').join('');
  abrirModal('<h2>📊 Balance — '+d.fecha+'</h2>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px">'+sh+'</div>'+
    '<table class="m-table"><thead><tr><th>Afiliado</th><th>Provincia</th><th>Cuotas</th><th>Total</th><th>Método</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="m-footer"><button class="btn-m bm-cancel" onclick="cerrarModal()">Cerrar</button><button class="btn-m bm-azul" onclick="dlBalance()">💾 .txt</button></div>');
}
