<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN - DENTAL WHITE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde: #27ae60;
    --verde-dark: #1e8449;
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
  }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(39,174,96,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--verde), #2ecc71);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(39,174,96,0.3);
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  select, input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  select:focus, input:focus { border-color: var(--verde); }
  select { cursor: pointer; }
  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--verde), var(--verde-dark));
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .error {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    color: #e74c3c;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🦷</div>
    <h1>DENTAL WHITE</h1>
    <div class="subtitle">Sistema de Cobranzas</div>
  </div>
  <form id="formLogin">
    <div class="field">
      <label>Usuario</label>
      <select name="usuario" id="usuario">
        <option value="ADMINISTRADORA">ADMINISTRADORA</option>
        <option value="NENNELLA">NENNELLA</option>
        <option value="MICAELA">MICAELA</option>
      </select>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="clave" id="clave" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn">INGRESAR</button>
    <div class="error" id="error">Clave incorrecta. Intentá de nuevo.</div>
  </form>
</div>
<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await fetch('/login', { method: 'POST', body: fd });
  if (res.ok) {
    const data = await res.json();
    sessionStorage.setItem('usuario', data.usuario);
    sessionStorage.setItem('provincias', JSON.stringify(data.provincias));
    window.location.href = '/panel';
  } else {
    document.getElementById('error').style.display = 'block';
  }
});
document.getElementById('clave').addEventListener('input', () => {
  document.getElementById('error').style.display = 'none';
});
</script>
</body>
</html>
